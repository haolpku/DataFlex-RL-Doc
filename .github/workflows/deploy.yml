name: deploy

on:
  # 每当 push 到 main 分支时触发部署
  # Deployment is triggered whenever a push is made to the main branch.
  push:
    branches: [main]
  # 手动触发部署
  # Manually trigger deployment
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # “最近更新时间” 等 git 日志相关信息，需要拉取全部提交记录
          # "Last updated time" and other git log-related information require fetching all commit records.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # 选择要使用的 node 版本
          node-version: 22

      # 安装依赖
      # Install dependencies
      - name: Install Dependencies
        run: npm ci --legacy-peer-deps



      # 运行构建脚本
      # Run the build script
      - name: Build VuePress site
        run: npm run docs:build


      # 查看 workflow 的文档来获取更多信息
      # @see https://github.com/crazy-max/ghaction-github-pages
      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v4
        with:
          # 部署到 gh-pages 分支
          target_branch: gh-pages
          # 部署目录为 VuePress 的默认输出目录
          build_dir: docs/.vuepress/dist
        env:
          # @see https://docs.github.com/cn/actions/reference/authentication-in-a-workflow#about-the-github_token-secret
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 部署后自测：等 GitHub Pages 原生部署完成后，抓取线上关键页面确认返回 200。
  # Post-deploy smoke test: after gh-pages is published, fetch key live URLs
  # (including newly added algorithm pages) and assert HTTP 200.
  smoke-test:
    needs: docs
    runs-on: ubuntu-latest
    steps:
      - name: Verify live pages return 200
        run: |
          BASE="https://haolpku.github.io/DataFlex-RL-Doc"
          # 待自测的页面：首页 + 各机制新算法页(中英)
          PAGES=(
            "/"
            "/en/guide/selector/gfpo/"
            "/en/guide/selector/pods_maxvar/"
            "/en/guide/reweighter/per_advantage/"
            "/en/guide/mixer/tscl/"
            "/zh/guide/selector/gfpo/"
            "/zh/guide/mixer/tscl/"
          )
          # GitHub Pages 原生部署在 gh-pages 更新后异步进行，先等再轮询。
          echo "Waiting 60s for GitHub Pages to publish the new gh-pages commit..."
          sleep 60

          fail=0
          for path in "${PAGES[@]}"; do
            url="${BASE}${path}"
            code=""
            # 每个页面最多重试 10 次(每次间隔 30s，覆盖 ~5min 部署窗口)
            for attempt in $(seq 1 10); do
              code=$(curl -s -o /dev/null -w '%{http_code}' -L "$url")
              if [ "$code" = "200" ]; then
                echo "OK   ($code) $url"
                break
              fi
              echo "wait ($code) attempt $attempt/10 $url"
              sleep 30
            done
            if [ "$code" != "200" ]; then
              echo "FAIL ($code) $url"
              fail=1
            fi
          done

          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more pages did not return 200 after deploy."
            exit 1
          fi
          echo "All pages returned 200."
